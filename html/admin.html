<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard {
            padding: 40px;
            max-width: 1000px;
            margin: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        
        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        
        th {
            background: #2c3e50;
            color: white;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body class="fade-in">

    <header class="hero">
        <h1>Admin Dashboard</h1>
        <p>View Student Applications</p>
        <button onclick="logout()" style="margin-top:10px; padding:8px 16px; border:none; border-radius:6px; cursor:pointer;">
        Logout
    </button>
    </header>

    <div class="dashboard">
        <h2>📋 Admission Applications</h2>
        <table id="applicationsTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Date of Birth</th>
                    <th>Class</th>
                    <th>Parent</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will load here -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadApplications() {
            try {
                const res = await fetch("https://rose-x1xu.onrender.com/api/admissions");
                const data = await res.json();

                const tableBody = document.querySelector("#applicationsTable tbody");
                tableBody.innerHTML = "";

                data.forEach(app => {
                    const row = `
                <tr>
                    <td>${app.studentName}</td>
                    <td>${app.dob}</td>
                    <td>${app.classApplying}</td>
                    <td>${app.parentName}</td>
                    <td>${app.phone}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteApp('${app._id}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error("Error loading applications:", error);
            }
        }

        async function deleteApp(id) {
            if (!confirm("Are you sure you want to delete this application?")) return;

            await fetch(`https://rose-x1xu.onrender.com/api/admissions/${id}`, {
                method: "DELETE"
            });

            loadApplications();
        }

        loadApplications();
    </script>

    <script>
        function logout() {
            localStorage.removeItem("adminLoggedIn");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
